<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Общество · Таймер</title>
<link rel="stylesheet" href="../src/ui/admin-style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<h1>УПРАВЛЕНИЕ ТАЙМЕРОМ</h1>

<div id="admin-sync-bar" class="sync-bar">● ПОДКЛЮЧЕНИЕ…</div>

<!-- Дисплей -->
<div class="section">
  <div id="admin-phase-name" class="display-phase">УРОВЕНЬ 1</div>
  <div id="admin-timer-display" class="display-big">12:00</div>
  <div id="admin-blinds" class="display-blinds">100 / 100</div>
  <div id="admin-phase-progress" class="display-progress"></div>
</div>

<!-- Старт / Пауза -->
<div class="section">
  <h2>УПРАВЛЕНИЕ</h2>
  <div class="btn-grid">
    <button id="btn-start" class="btn-ok" onclick="timerStart()">▶ СТАРТ</button>
    <button id="btn-pause" class="btn-err" onclick="timerPause()">⏸ ПАУЗА</button>
    <button onclick="timerPrev()">← НАЗАД</button>
    <button onclick="timerNext()">ДАЛЬШЕ →</button>
    <button onclick="timerResetCurrentPhase()">↺ СБРОС УРОВНЯ</button>
    <button id="btn-final" onclick="toggleFinalMode()">🏆 Финальный стол</button>
  </div>
  <div class="btn-grid btn-grid-1" style="margin-top:6px;">
    <button class="btn-err" onclick="confirmResetAll()">⚠ СБРОСИТЬ ТУРНИР</button>
  </div>
</div>

<!-- Структура -->
<div class="section">
  <h2>СТРУКТУРА</h2>
  <label>Выбрать структуру</label>
  <select id="sel-structure" onchange="applyStructure(this.value)">
    <option value="default">Обычная / Суббота</option>
    <option value="action30k">Экшен 30К</option>
  </select>
  <div id="admin-structure-name" style="font-size:10px;color:var(--text3);margin-top:6px;letter-spacing:1px;"></div>
</div>

<!-- Быстрый переход -->
<div class="section">
  <h2>БЫСТРЫЙ ПЕРЕХОД</h2>
  <div class="btn-grid btn-grid-3">
    <button onclick="timerGoToLevel(1)">1</button>
    <button onclick="timerGoToLevel(5)">5</button>
    <button onclick="timerGoToLevel(10)">10</button>
    <button onclick="timerGoToLevel(11)">11</button>
    <button onclick="timerGoToLevel(15)">15</button>
    <button onclick="timerGoToLevel(20)">20</button>
  </div>
</div>

<!-- Просмотр структуры -->
<div class="section">
  <h2>СТРУКТУРА БЛАЙНДОВ</h2>
  <div class="btn-grid btn-grid-1">
    <button onclick="toggleStructureView()" id="btn-show-structure">📋 ПОКАЗАТЬ ВСЕ УРОВНИ</button>
  </div>
  <div id="structure-view" style="display:none;margin-top:10px;max-height:300px;overflow-y:auto;">
    <div id="structure-table" class="preview"></div>
  </div>
</div>

<!-- Emergency -->
<div class="section">
  <h2>АВАРИЙНЫЙ РЕЖИМ</h2>
  <div class="btn-grid btn-grid-1">
    <button onclick="saveTimerNow()" class="btn-gold">💾 СОХРАНИТЬ СЕЙЧАС</button>
    <button id="btn-emergency-local" onclick="toggleEmergencyLocal()">🆘 ЛОКАЛЬНЫЙ РЕЖИМ</button>
  </div>
  <div id="emergency-status" style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:6px;text-align:center;"></div>
</div>

<!-- ── SCRIPTS ────────────────────────────────────────────── -->
<script src="../src/core/config.js"></script>
<script src="../src/core/cloud-client.js"></script>
<script src="../src/timer/structures.js"></script>
<script src="../src/timer/timer-state.js"></script>
<script src="../src/timer/timer-storage.js"></script>
<script src="../src/timer/timer-cloud.js"></script>
<script src="../src/timer/timer-engine.js"></script>
<script src="../src/timer/timer-render-admin.js"></script>

<script>
// ── ADMIN TIMER INIT ─────────────────────────────────────────
// admin-timer.html — единственный writer таймера

setTimerStatusElement(document.getElementById('admin-sync-bar'));

// isWriter = true — пишем в cloud
initTimerEngine(true);

// Первый рендер
renderTimerAdmin(getTimerState());

// Рендер каждую секунду (только рисует)
setInterval(function() {
  renderTimerAdmin(getTimerState());
}, 1000);

// Cloud sync — читаем и мержим каждые 30 сек (медленнее чем TV)
setInterval(async function() {
  const cloudState = await loadCloudTimerState();
  if (cloudState) applyCloudTimerState(cloudState);
}, 30000);

// Загружаем из cloud при старте
(async function() {
  setTimerCloudStatus('loading');
  const cloudState = await loadCloudTimerState();
  if (cloudState) {
    applyCloudTimerState(cloudState);
  }
  // null = cloud работает, просто timer-state ещё не создан — не offline
})();

// ── КНОПКИ ───────────────────────────────────────────────────

function toggleFinalMode() {
  const state = getTimerState();
  timerSetFinalMode(!state.finalMode);
}

function applyStructure(id) {
  if (!confirm('Сменить структуру? Таймер сбросится.')) {
    document.getElementById('sel-structure').value = getTimerState().structureId;
    return;
  }
  timerSetStructure(id);
}

function confirmResetAll() {
  if (!confirm('Сбросить весь турнир? Это вернёт таймер к началу.')) return;
  const id = document.getElementById('sel-structure').value;
  timerResetAll(id);
}

// ── АВАРИЙНЫЙ РЕЖИМ ───────────────────────────────────────
// Временно отключает cloud-запись, работает только с localStorage.
// Полезно если Google Script упал или нет интернета.

let _emergencyLocalMode = false;

function toggleStructureView() {
  const view = document.getElementById('structure-view');
  const btn  = document.getElementById('btn-show-structure');
  const open = view.style.display === 'none';
  view.style.display = open ? '' : 'none';
  btn.textContent = open ? '▲ СКРЫТЬ' : '📋 ПОКАЗАТЬ ВСЕ УРОВНИ';
  if (open) renderStructureTable();
}

function renderStructureTable() {
  const state = getTimerState();
  if (!state) return;
  const struct = getStructure(state.structureId);
  const phases = struct.phases;
  let html = '<div style="font-size:9px;color:var(--gold3);letter-spacing:2px;margin-bottom:6px;">'
    + struct.name.toUpperCase() + ' · ' + phases.filter(p=>p.type==="level").length + ' УРОВНЕЙ</div>';
  html += '<table style="width:100%;border-collapse:collapse;font-size:10px;">'
    + '<tr style="color:var(--text3);"><th style="text-align:left;padding:2px 4px;">#</th>'
    + '<th style="padding:2px 4px;">СБ</th><th style="padding:2px 4px;">ББ</th>'
    + '<th style="padding:2px 4px;">Анте</th><th style="padding:2px 4px;">Время</th></tr>';
  const currentIdx = state.phaseIndex || 0;
  phases.forEach((p, i) => {
    const isCurrent = i === currentIdx;
    const style = isCurrent
      ? 'background:rgba(201,169,110,0.15);color:var(--gold);'
      : 'color:var(--text2);';
    if (p.type === 'break') {
      html += '<tr style="'+style+'border-top:1px solid rgba(201,169,110,0.1);">'
        + '<td style="padding:3px 4px;" colspan="5">— ' + (p.title||'ПЕРЕРЫВ')
        + ' ' + Math.floor(p.duration/60) + 'мин'
        + (isCurrent ? ' ◀' : '') + '</td></tr>';
    } else {
      const fmt = n => n>=1000?(n/1000)+(n%1000?'K':'K'):''+n;
      html += '<tr style="'+style+'">'
        + '<td style="padding:2px 4px;">' + p.level + (isCurrent?' ◀':'') + '</td>'
        + '<td style="padding:2px 4px;text-align:center;">' + fmt(p.sb) + '</td>'
        + '<td style="padding:2px 4px;text-align:center;">' + fmt(p.bb) + '</td>'
        + '<td style="padding:2px 4px;text-align:center;">' + (p.ante ? fmt(p.ante) : '—') + '</td>'
        + '<td style="padding:2px 4px;text-align:center;">' + Math.floor(p.duration/60) + '</td></tr>';
    }
  });
  html += '</table>';
  document.getElementById('structure-table').innerHTML = html;
}

function toggleEmergencyLocal() {
  _emergencyLocalMode = !_emergencyLocalMode;
  const btn = document.getElementById('btn-emergency-local');
  const status = document.getElementById('emergency-status');

  if (_emergencyLocalMode) {
    // Принудительно переключаем cloud на off
    if (typeof APP_CONFIG !== 'undefined') APP_CONFIG._cloudOverride = false;
    btn.textContent = '☁️ ВЕРНУТЬ CLOUD';
    btn.classList.add('active');
    if (status) status.textContent = '⚠️ ЛОКАЛЬНЫЙ РЕЖИМ АКТИВЕН — cloud не пишется';
    setTimerCloudStatus('local');
  } else {
    if (typeof APP_CONFIG !== 'undefined') APP_CONFIG._cloudOverride = undefined;
    btn.textContent = '🆘 ЛОКАЛЬНЫЙ РЕЖИМ';
    btn.classList.remove('active');
    if (status) status.textContent = '';
    setTimerCloudStatus('loading');
    // Сразу пытаемся сохранить в cloud
    saveCloudTimerStateDebounced(getTimerState(), 'emergency_restore');
  }
}

function saveTimerNow() {
  const state = getTimerState();
  saveLocalTimerState(state);
  saveCloudTimerStateDebounced(state, 'manual_save');
  setTimerCloudStatus('loading');
}

// Синхронизируем select со структурой
setInterval(function() {
  const state = getTimerState();
  if (!state) return;
  const sel = document.getElementById('sel-structure');
  if (sel && sel.value !== state.structureId) sel.value = state.structureId;
}, 2000);
</script>
</body>
</html>
